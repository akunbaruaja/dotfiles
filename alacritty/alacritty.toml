# Alacritty config

[env]
TERM = "xterm-256color"

[window]
padding = { x = 8, y = 8 }
decorations = "None"
opacity = 0.95

[font]
size = 13.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[colors.primary]
background = "#1a1b26"
foreground = "#c0caf5"

[colors.cursor]
text = "#1a1b26"
cursor = "#c0caf5"

[colors.selection]
text = "#c0caf5"
background = "#33467c"

[colors.normal]
black   = "#15161e"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#a9b1d6"

[colors.bright]
black   = "#414868"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"

[keybindings]
{ key = "V", mods = "Control|Shift", action = "Paste" }
{ key = "C", mods = "Control|Shift", action = "Copy" }
{ key = "Plus", mods = "Control", action = "IncreaseFontSize" }
{ key = "Minus", mods = "Control", action = "DecreaseFontSize" }
{ key = "Key0", mods = "Control", action = "ResetFontSize" }
